<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JainScan</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="header-bar">
          <h1>JainScan</h1>
          <button id="settingsBtn" type="button" class="text-link">Settings</button>
        </div>
        <p>Scan a barcode and get a Jain dietary verdict.</p>
      </header>

      <section class="controls card">
        <div id="videoWrap" class="video-wrap">
          <video id="videoPreview" muted playsinline></video>
          <p id="scanStatus" class="hint">Scanner idle.</p>
        </div>

        <div id="progressWrap" class="progress-wrap hidden" aria-live="polite" aria-atomic="true">
          <span class="spinner" aria-hidden="true"></span>
          <span id="progressText">Looking up barcode...</span>
        </div>

        <div id="messageBox" class="message-box hidden" role="alert" aria-live="assertive"></div>

        <form id="manualForm" class="manual-form">
          <label for="manualBarcode">Manual barcode entry</label>
          <div class="manual-row">
            <input
              id="manualBarcode"
              name="manualBarcode"
              placeholder="e.g., 0123456789012"
              inputmode="numeric"
              pattern="[0-9]{12,13}"
              minlength="12"
              maxlength="13"
              aria-describedby="manualHelp"
              aria-label="Manual barcode entry"
              autocomplete="off"
              required
            />
            <button id="checkBtn" type="submit" disabled>Check</button>
            <button id="newScanBtn" type="button" class="ghost hidden">New scan</button>
          </div>
          <p id="manualHelp" class="field-help" aria-live="polite">Enter 12 or 13 digits.</p>
        </form>
      </section>

      <section id="resultSection" class="result card hidden" aria-live="polite">
        <div id="verdictCard" class="verdict verdict-UNKNOWN">
          <p id="statusLabel" class="status">UNKNOWN</p>
          <p id="explainText" class="explain">Scan a barcode to begin.</p>
          <p id="confidenceText" class="confidence">Confidence: --</p>
        </div>
        <div id="reasonChips" class="chips"></div>
        <div class="result-actions">
          <p id="savedNote" class="saved-note"></p>
          <a id="reportIssueLink" class="report-link hidden" href="#" rel="nofollow">Report issue</a>
        </div>
        <section id="ingredientSection" class="ingredient-section hidden">
          <h3>Ingredient Categories</h3>
          <div id="ingredientRows" class="ingredient-rows" role="list"></div>
        </section>
        <p id="barcodeInfo" class="meta"></p>
      </section>
    </main>

    <footer class="footer-bar">
      <span class="ad-strip">Ad placeholder (free tier)</span>
    </footer>

    <dialog id="settingsModal" class="settings-modal">
      <form id="settingsForm" method="dialog" class="card settings-card">
        <h2>API Settings</h2>
        <label for="apiBaseInput">API base URL</label>
        <input id="apiBaseInput" name="apiBaseInput" type="url" required />
        <p id="clientIdText" class="hint"></p>
        <div class="row actions">
          <button id="resetApiBtn" type="button" class="ghost">Reset Default</button>
          <button id="cancelSettingsBtn" type="button" class="ghost">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
